version: '3.8'

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ner_user
      POSTGRES_PASSWORD: ner_password
      POSTGRES_DB: ner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-gemma3:1b}
    entrypoint: /bin/sh
    command: -c "while ! ollama list >/dev/null 2>&1; do sleep 1; done; echo 'Pulling model...'; ollama pull $${LLM_MODEL}; echo 'Done!'"

volumes:
  postgres_data:
  ollama_data:
